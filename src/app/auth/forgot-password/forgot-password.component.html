<div class="auth-wrapper d-flex align-items-center justify-content-center">
    <div class="auth-card shadow-lg p-4 bg-white rounded-4" style="max-width: 450px; width: 100%;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-gold">KHÔI PHỤC MẬT KHẨU</h2>
            <div class="gold-divider mx-auto"></div>
        </div>

        <div *ngIf="step === 1">
            <p class="text-muted text-center mb-4">Nhập email của bạn để nhận mã xác nhận (OTP).</p>
            <div class="mb-3">
                <label class="form-label small fw-bold">EMAIL ĐĂNG KÝ</label>
                <input type="email" class="form-control" [(ngModel)]="email" placeholder="example@gmail.com">
            </div>
            <button class="btn btn-gold w-100 py-2 mb-3" [disabled]="loading" (click)="sendOTP()">
                <span *ngIf="!loading">GỬI MÃ XÁC NHẬN</span>
                <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>
            </button>
        </div>

        <div *ngIf="step === 2">
            <div class="alert alert-info py-2 small">
                <i class="bi bi-check-circle-fill me-2"></i> Mã OTP đã được gửi về email của bạn.
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">MÃ XÁC NHẬN (OTP)</label>
                <input type="text" class="form-control text-center fs-4 fw-bold letter-spacing-5" [(ngModel)]="otp"
                    maxlength="6" placeholder="000000">
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">MẬT KHẨU MỚI</label>
                <input type="password" class="form-control" [(ngModel)]="newPassword" placeholder="********">
            </div>
            <button class="btn btn-gold w-100 py-2 mb-3" [disabled]="loading" (click)="confirmReset()">
                <span *ngIf="!loading">ĐỔI MẬT KHẨU</span>
                <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>
            </button>
            <button class="btn btn-link w-100 text-muted small" (click)="step = 1">Quay lại nhập email</button>
        </div>

        <div class="text-center mt-3">
            <a routerLink="/login" class="text-decoration-none text-dark small">Quay về trang đăng nhập</a>
        </div>
    </div>
</div>
