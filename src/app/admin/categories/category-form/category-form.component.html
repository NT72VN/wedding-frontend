<div class="container mt-4">
    <div class="card p-4 shadow-sm">
        <h3>{{ isEdit ? '✏️ Cập nhật loại sản phẩm' : '➕ Thêm loại sản phẩm mới' }}</h3>
        <hr>
        <form (ngSubmit)="submit()">
            <div class="mb-3">
                <label class="form-label">Tên loại sản phẩm</label>
                <input type="text" class="form-control" name="name" [(ngModel)]="category.name" required
                    placeholder="Ví dụ: Trang trí">
            </div>
            <div class="mb-3">
                <label class="form-label">Mô tả</label>
                <textarea class="form-control" name="description" [(ngModel)]="category.description"
                    rows="3"></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">
                    {{ isEdit ? 'Cập nhật' : 'Lưu lại' }}
                </button>
                <button type="button" class="btn btn-secondary" routerLink="/admin/categories">Hủy bỏ</button>
            </div>
        </form>
    </div>
</div>
