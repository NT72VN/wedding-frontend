<div class="container mt-4">
  <h2 class="fw-bold mb-4"><i class="bi bi-box-seam me-2"></i>Quản lý đơn hàng</h2>

  <div *ngIf="loading" class="text-center my-5">
    <div class="spinner-border text-gold"></div>
    <p class="text-muted mt-2">Đang tải danh sách đơn hàng...</p>
  </div>

  <div class="table-responsive shadow-sm rounded bg-white" *ngIf="!loading && orders.length > 0">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-dark">
        <tr>
          <th class="text-center">STT</th>
          <th>Khách hàng</th>
          <th>Ngày đặt</th>
          <th>Tổng tiền</th>
          <th>Trạng thái</th>
          <th class="text-center">Hành động</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let o of orders; let i = index">
          <td class="text-center">{{ i + 1 }}</td>
          <td>
            <div class="fw-bold">{{ o.name }}</div>
            <small class="text-muted">{{ o.phone || 'Chưa có SĐT' }}</small>
          </td>
          <td>{{ o.createdAt | date:'dd/MM/yyyy HH:mm' }}</td>
          <td class="fw-bold text-danger">{{ o.totalPrice | number }} ₫</td>

          <td>
            <select [value]="o.status" class="form-select form-select-sm status-select" [ngClass]="{
                'border-warning text-warning': o.status === 'pending',
                'border-info text-info': o.status === 'shipping',
                'border-success text-success': o.status === 'completed',
                'border-danger text-danger': o.status === 'cancelled'
              }" (change)="updateStatus(o._id || o.id, $any($event.target).value)">
              <option value="pending">⏳ Chờ xác nhận</option>
              <option value="shipping">🚚 Đang giao</option>
              <option value="completed">✅ Hoàn thành</option>
              <option value="cancelled">❌ Đã hủy</option>
            </select>
          </td>

          <td class="text-center">
            <button class="btn btn-sm btn-outline-dark" (click)="viewDetail(o._id || o.id)">
              <i class="bi bi-eye"></i> Xem
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="text-center py-5 border rounded bg-light mt-3" *ngIf="orders.length === 0 && !loading">
    <i class="bi bi-inbox fs-1 text-muted"></i>
    <p class="mt-3 text-muted">Hiện chưa có đơn hàng nào được đặt.</p>
  </div>
</div>
