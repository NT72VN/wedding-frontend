<div class="container py-5" *ngIf="user">

    <h3 class="mb-4">👤 Thông tin cá nhân</h3>

    <div class="card p-4 shadow" style="max-width: 500px">

        <!-- AVATAR -->
        <div class="text-center mb-4">
            <img [src]="user.avatar" class="rounded-circle mb-2" width="120" height="120" style="object-fit: cover">

            <div>
                <input type="file" accept="image/*" class="form-control" (change)="onAvatarChange($event)">
            </div>
        </div>

        <!-- NAME -->
        <div class="mb-3">
            <label class="form-label">Tên</label>
            <input class="form-control" [(ngModel)]="user.name">
        </div>

        <!-- EMAIL -->
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" [(ngModel)]="user.email" disabled>
        </div>

        <!-- ROLE -->
        <div class="mb-3">
            <label class="form-label">Vai trò</label>
            <input class="form-control" [value]="user.role" disabled>
        </div>

        <button class="btn btn-primary w-100" (click)="save()">
            💾 Lưu thay đổi
        </button>

    </div>
</div>
