<section class="hero-sync">
    <div class="hero-video-wrapper">
        <video class="hero-video-bg" autoplay muted loop playsinline>
            <source src="/videos/1.mp4" type="video/mp4" />
        </video>
        <div class="hero-overlay-dark"></div>
    </div>

    <div class="hero-content-inner" data-aos="zoom-out" data-aos-duration="1500">
        <h1 class="display-3 fw-bold">DỊCH VỤ CƯỚI TRỌN GÓI</h1>
        <div class="gold-divider mx-auto my-3"></div>
        <p class="lead text-uppercase ls-2">DUC & CO. WEDDINGS – Nâng tầm khoảnh khắc hạnh phúc</p>
    </div>
</section>

<div class="category-filter-bar py-4 bg-white shadow-sm sticky-top">
    <div class="container d-flex justify-content-center flex-wrap gap-2">
        <button *ngFor="let cat of categories" (click)="filterByCategory(cat)" [class.active]="selectedCategory === cat"
            class="btn-filter-gold text-uppercase">
            {{ cat === 'all' ? 'Tất cả dịch vụ' : cat }}
        </button>
    </div>
</div>

<main class="products-container-fixed py-5">
    <div class="container">

        <div *ngIf="loading" class="text-center py-5">
            <div class="spinner-border text-gold"></div>
            <p class="mt-3 text-muted italic">Đang chuẩn bị những trải nghiệm tốt nhất...</p>
        </div>

        <div class="row g-4" *ngIf="!loading">
            <div class="col-lg-4 col-md-6 d-flex align-items-stretch" *ngFor="let item of products" data-aos="fade-up">
                <div class="card service-card-pro w-100">
                    <div class="card-img-holder">
                        <img [src]="item.image" class="card-img-top" [alt]="item.name"
                            (error)="handleImageError($event)" />
                        <div class="luxury-badge" *ngIf="item.category">{{ item.category }}</div>
                    </div>

                    <div class="card-body d-flex flex-column">
                        <h5 class="service-title-pro">{{ item.name }}</h5>
                        <p class="service-desc-pro text-muted">
                            {{ item.description }}
                        </p>

                        <div class="mt-auto pt-4 border-top d-flex justify-content-between align-items-center">
                            <div class="price-pro">
                                <span class="label">Từ</span>
                                <span class="amount">{{ item.price | number }}</span>
                                <span class="unit">đ</span>
                            </div>
                            <a [routerLink]="['/products', item._id || item.id]" class="btn-gold-link">
                                Chi tiết <i class="bi bi-arrow-right ms-1"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 text-center py-5" *ngIf="products.length === 0 && !loading">
            <i class="bi bi-stars fs-1 text-gold"></i>
            <p class="mt-3 text-muted">Hiện chưa có dịch vụ này khả dụng.</p>
        </div>
    </div>
</main>
