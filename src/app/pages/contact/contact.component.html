<section class="hero-contact">
    <video class="hero-video" autoplay muted loop playsinline>
        <source src="videos/1.mp4" type="video/mp4" />
    </video>
    <div class="overlay"></div>

    <div class="hero-content" data-aos="zoom-out" data-aos-duration="2000">
        <h1 class="display-3 fw-bold">DUC & CO. WEDDINGS</h1>
        <p class="lead">Hành trình hạnh phúc của bạn bắt đầu từ một lời nhắn</p>
    </div>
</section>

<main class="container py-5 overflow-hidden">
    <div class="row g-5 align-items-stretch">

        <div class="col-lg-7" data-aos="fade-right" data-aos-delay="200">
            <div class="contact-card h-100 d-flex flex-column">
                <h3 class="section-title-contact mb-4">Gửi yêu cầu tư vấn</h3>
                <form class="flex-grow-1 d-flex flex-column justify-content-between">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Họ và tên *</label>
                            <input type="text" class="form-control" placeholder="Nguyễn Văn A" required />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Số điện thoại *</label>
                            <input type="tel" class="form-control" placeholder="0909 xxx xxx" required />
                        </div>
                        <div class="col-12">
                            <label class="form-label">Dịch vụ quan tâm</label>
                            <select class="form-select">
                                <option selected disabled>Chọn dịch vụ...</option>
                                <option>Trang trí tiệc cưới</option>
                                <option>Chụp ảnh & Quay phim</option>
                                <option>Trọn gói từ A - Z</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Lời nhắn</label>
                            <textarea class="form-control" rows="5"
                                placeholder="Chia sẻ với chúng tôi ý tưởng của bạn..."></textarea>
                        </div>
                    </div>
                    <div class="pt-4">
                        <button type="submit" class="btn btn-contact w-100">Gửi thông tin ngay</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-lg-5" data-aos="fade-left" data-aos-delay="400">
            <div class="contact-info h-100 d-flex flex-column">
                <h3 class="section-title-contact text-white mb-4">Thông tin liên hệ</h3>
                <ul class="info-list">
                    <li>
                        <div class="icon-box"><i class="bi bi-geo-alt"></i></div>
                        <div class="info-text">
                            <small>ĐỊA CHỈ</small>
                            <span>123 Nguyễn Văn A, Quận 1, TP.HCM</span>
                        </div>
                    </li>
                    <li>
                        <div class="icon-box"><i class="bi bi-telephone"></i></div>
                        <div class="info-text">
                            <small>HOTLINE</small>
                            <span>0909 123 456</span>
                        </div>
                    </li>
                    <li>
                        <div class="icon-box"><i class="bi bi-envelope"></i></div>
                        <div class="info-text">
                            <small>EMAIL</small>
                            <span>contact@ducwedding.vn</span>
                        </div>
                    </li>
                </ul>

                <div class="map-container flex-grow-1 mt-3">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3919.460232428642!2d106.6974457!3d10.7760194!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31752f3855799c45%3A0x24f5e297000d603a!2zUXXhuq1uIDEsIFRow6BuaCBwaOG7kSBI4buTIENow60gTWluaCwgVmnhu4d0IE5hbQ!5e0!3m2!1svi!2s!4v1705500000000!5m2!1svi!2s"
                        style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </div>
        </div>

    </div>
</main>
